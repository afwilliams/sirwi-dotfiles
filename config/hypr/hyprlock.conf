general {
    hide_cursor = false
}

background {
    monitor =
    path = ~/.config/hypr/assets/wallpapers/sirwi-room.png
    blur_passes = 4
    blur_size = 7
    noise = 0.0117
    contrast = 0.92
    brightness = 0.72
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 580, 700
    color = rgba(0a0f1ecc)
    rounding = 34
    border_size = 3
    border_color = rgba(0a0f1eff)
    halign = center
    valign = center
}

shape {
    monitor =
    size = 520, 640
    color = rgba(1f3a5c66)
    rounding = 28
    border_size = 1
    border_color = rgba(f5d38966)
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 340, 56
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(f5d38988)
    inner_color = rgba(0a0f1eee)
    font_color = rgb(248, 250, 252)
    fade_on_empty = false
    placeholder_text = <i>Password</i>
    hide_input = true
    check_color = rgba(f5d389cc)
    fail_color = rgba(fca5a5cc)
    fail_text = <i>Try again</i>
    position = 0, -215
    halign = center
    valign = center
}

shape {
    monitor =
    size = 140, 46
    color = rgba(1f3a5c99)
    rounding = 999
    border_size = 2
    border_color = rgba(0a0f1eff)
    position = -32, 32
    halign = right
    valign = bottom
    onclick = systemctl suspend
}

label {
    monitor =
    text = 󰖔  Suspend
    color = rgba(f5d389e6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -50, 43
    halign = right
    valign = bottom
    zindex = 1
    onclick = systemctl suspend
}

image {
    monitor =
    path = ~/.config/hypr/assets/sir-williams-avatar.png
    border_size = 3
    border_color = rgba(f5d389cc)
    size = 128
    rounding = -1
    rotate = 0
    reload_time = -1
    position = 0, -24
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(f8fafcff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 210
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A")"
    color = rgba(f5d389e6)
    font_size = 34
    font_family = JetBrainsMono Nerd Font
    position = 0, 145
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%d %B")"
    color = rgba(e8ecf5c9)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 103
    halign = center
    valign = center
}

label {
    monitor =
    text = LOCKED
    color = rgba(e8ecf5b8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -112
    halign = center
    valign = center
}

label {
    monitor =
    text = SIR WILLIAMS
    color = rgba(f8fafcff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -145
    halign = center
    valign = center
}
