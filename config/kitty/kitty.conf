# Sirwi Kitty theme

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.5

disable_ligatures never
cursor_shape block
cursor_blink_interval 0.6
cursor_stop_blinking_after 15.0

window_padding_width 0
placement_strategy center
remember_window_size yes
initial_window_width 110c
initial_window_height 32c

background_opacity 0.88
dynamic_background_opacity yes
background_blur 24

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_font_style bold
inactive_tab_font_style normal

map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
map ctrl+shift+d detach_tab new

foreground #f8fafc
background #0a0f1e
selection_foreground #1a1d28
selection_background #f5d389

cursor #f5d389
cursor_text_color #0a0f1e

url_color #f5d389
active_border_color #f5d389
inactive_border_color #1f3a5c
bell_border_color #fca5a5
visual_bell_color #3b2430

active_tab_foreground #1a1d28
active_tab_background #f5d389
inactive_tab_foreground #e8ecf5
inactive_tab_background #1f3a5c
tab_bar_background #0a0f1e

color0 #0a0f1e
color8 #244266

color1 #fca5a5
color9 #fecaca

color2 #86efac
color10 #bbf7d0

color3 #f5d389
color11 #fde68a

color4 #60a5fa
color12 #93c5fd

color5 #c4b5fd
color13 #ddd6fe

color6 #67e8f9
color14 #a5f3fc

color7 #e8ecf5
color15 #f8fafc

confirm_os_window_close 0
enable_audio_bell no
copy_on_select clipboard
strip_trailing_spaces smart
